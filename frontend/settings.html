<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Settings - Student Hustle Hub</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    <meta name="description" content="Configure Student Hustle Hub API connection for production or local use.">
    <meta name="api-base-url" content="http://localhost:5000/api">
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="config.js"></script>
    <script defer src="app.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0F766E',
                        secondary: '#F59E0B',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen antialiased text-slate-900 dark:text-slate-100" data-requires-auth="true">
    <div class="app-bg"></div>
    <header id="app-navbar"></header>

    <main class="mx-auto max-w-4xl px-4 pb-16 pt-10">
        <section id="settings-denied" class="hidden glass rounded-2xl p-10 text-center shadow-sm">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-2xl bg-rose-500/10 text-rose-600 dark:bg-rose-500/15 dark:text-rose-300">
                <i data-lucide="shield-x" class="h-5 w-5"></i>
            </div>
            <h1 class="mt-4 text-lg font-semibold text-slate-900 dark:text-white">You are not an admin</h1>
            <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">Platform connection settings are available only to admin accounts.</p>
            <a href="index.html" class="mt-5 inline-flex items-center gap-2 rounded-xl bg-primary px-4 py-2.5 text-sm font-medium text-white shadow-sm transition hover:brightness-95">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>
                Back to browse
            </a>
        </section>

        <section id="settings-content" class="hidden glass rounded-2xl p-6 shadow-sm sm:p-8">
            <div class="flex items-start gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary/10 text-primary ring-1 ring-primary/20 dark:bg-primary/20 dark:ring-primary/30">
                    <i data-lucide="server" class="h-5 w-5"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-white">API Connection Settings</h1>
                    <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">Set the backend API URL once, and all pages use it automatically.</p>
                </div>
            </div>

            <div class="mt-6 rounded-xl border border-slate-200/70 bg-white/70 p-4 dark:border-slate-700/60 dark:bg-slate-950/40">
                <div class="flex flex-wrap items-center gap-2">
                    <span id="mode-badge" class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold"></span>
                    <p id="mode-text" class="text-sm text-slate-600 dark:text-slate-300"></p>
                </div>
            </div>

            <form id="settings-form" class="mt-6 space-y-4">
                <div>
                    <label for="api-base-url" class="block text-sm font-medium text-slate-700 dark:text-slate-200">API base URL</label>
                    <div class="relative mt-1">
                        <input id="api-base-url" type="text" class="w-full rounded-xl border border-slate-200/70 bg-white/80 px-3 py-3 pr-10 text-sm text-slate-900 shadow-sm outline-none ring-primary/30 placeholder:text-slate-400 focus:border-primary/60 focus:ring-4 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-white dark:placeholder:text-slate-400" placeholder="https://your-api-domain/api">
                        <span id="api-url-copy-wrapper" class="absolute inset-y-0 right-0 flex items-center pr-3"></span>
                    </div>
                    <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">Examples: <span class="font-medium">http://localhost:5000/api</span> or <span class="font-medium">https://api.example.com/api</span></p>
                </div>

                <div id="status-message" class="hidden rounded-xl border px-4 py-3 text-sm"></div>

                <div class="flex flex-wrap items-center gap-2">
                    <button type="submit" class="inline-flex items-center gap-2 rounded-xl bg-primary px-4 py-2.5 text-sm font-medium text-white shadow-sm transition hover:brightness-95">
                        <i data-lucide="save" class="h-4 w-4"></i>
                        Save
                    </button>
                    <button id="test-connection" type="button" class="inline-flex items-center gap-2 rounded-xl border border-slate-200/70 bg-white/70 px-4 py-2.5 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-white dark:border-slate-700/60 dark:bg-slate-950/40 dark:text-slate-200 dark:hover:bg-slate-950/60">
                        <i data-lucide="activity" class="h-4 w-4"></i>
                        Test connection
                    </button>
                    <button id="use-local" type="button" class="inline-flex items-center gap-2 rounded-xl border border-slate-200/70 bg-white/70 px-4 py-2.5 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-white dark:border-slate-700/60 dark:bg-slate-950/40 dark:text-slate-200 dark:hover:bg-slate-950/60">
                        <i data-lucide="laptop" class="h-4 w-4"></i>
                        Use localhost
                    </button>
                    <button id="clear-settings" type="button" class="inline-flex items-center gap-2 rounded-xl border border-rose-200/70 bg-rose-50 px-4 py-2.5 text-sm font-medium text-rose-700 shadow-sm transition hover:bg-rose-100 dark:border-rose-500/30 dark:bg-rose-500/10 dark:text-rose-200 dark:hover:bg-rose-500/20">
                        <i data-lucide="trash-2" class="h-4 w-4"></i>
                        Clear
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('api-base-url');
            const form = document.getElementById('settings-form');
            const modeBadge = document.getElementById('mode-badge');
            const modeText = document.getElementById('mode-text');
            const statusMessage = document.getElementById('status-message');
            const testBtn = document.getElementById('test-connection');
            const localBtn = document.getElementById('use-local');
            const clearBtn = document.getElementById('clear-settings');
            const apiUrlCopyWrapper = document.getElementById('api-url-copy-wrapper');

            const showStatus = (message, type = 'info') => {
                statusMessage.classList.remove('hidden', 'border-emerald-200', 'bg-emerald-50', 'text-emerald-700', 'border-rose-200', 'bg-rose-50', 'text-rose-700', 'border-slate-200', 'bg-slate-50', 'text-slate-700');
                if (type === 'success') {
                    statusMessage.classList.add('border-emerald-200', 'bg-emerald-50', 'text-emerald-700');
                } else if (type === 'error') {
                    statusMessage.classList.add('border-rose-200', 'bg-rose-50', 'text-rose-700');
                } else {
                    statusMessage.classList.add('border-slate-200', 'bg-slate-50', 'text-slate-700');
                }
                statusMessage.innerText = message;
            };

            const setupCopyButton = () => {
                if (!apiUrlCopyWrapper || !window.SHHub?.createCopyButton) return;
                apiUrlCopyWrapper.innerHTML = '';
                const url = input.value.trim();
                if (url) {
                    const copyBtn = window.SHHub.createCopyButton(url, { toastMessage: 'API URL copied!' });
                    apiUrlCopyWrapper.appendChild(copyBtn);
                    window.SHHub.refreshIcons();
                }
            };

            const applyModeUI = () => {
                const baseUrl = window.SHHub?.getApiBaseUrl?.() ?? '';
                const apiMode = window.SHHub?.isApiMode?.() === true;

                modeBadge.className = apiMode
                    ? 'inline-flex items-center rounded-full bg-emerald-500/15 px-3 py-1 text-xs font-semibold text-emerald-700 ring-1 ring-emerald-500/30 dark:bg-emerald-400/15 dark:text-emerald-200'
                    : 'inline-flex items-center rounded-full bg-amber-500/15 px-3 py-1 text-xs font-semibold text-amber-700 ring-1 ring-amber-500/30 dark:bg-amber-400/15 dark:text-amber-200';
                modeBadge.innerText = apiMode ? 'API mode' : 'Demo mode';

                modeText.innerText = apiMode
                    ? 'Connected mode is enabled.'
                    : 'Demo mode is enabled for this browser.';
                input.value = baseUrl;
                setupCopyButton();
            };

            const testConnection = async () => {
                const target = input.value.trim();
                if (!target) {
                    showStatus('Enter API URL first, then test connection.', 'error');
                    return;
                }

                const healthUrl = `${target.replace(/\/+$/, '')}/health`;
                showStatus('Testing connection...', 'info');
                const startedAt = performance.now();

                try {
                    const response = await fetch(healthUrl);
                    if (!response.ok) throw new Error(`Health check failed (${response.status})`);
                    const elapsed = Math.round(performance.now() - startedAt);
                    showStatus(`Connected successfully in ${elapsed} ms.`, 'success');
                } catch (error) {
                    showStatus(error?.message || 'Connection test failed.', 'error');
                }
            };

            form.addEventListener('submit', (event) => {
                event.preventDefault();
                const nextUrl = input.value.trim();
                const saved = window.SHHub?.setApiBaseUrl?.(nextUrl) ?? '';

                if (saved) {
                    showStatus('Connection settings saved successfully.', 'success');
                } else {
                    showStatus('API URL cleared. Demo mode enabled.', 'info');
                }
                applyModeUI();
                window.SHHub?.refreshIcons?.();
            });

            testBtn.addEventListener('click', testConnection);
            localBtn.addEventListener('click', () => {
                input.value = 'http://localhost:5000/api';
                showStatus('Localhost URL filled. Click Save to apply.', 'info');
                setupCopyButton();
            });
            clearBtn.addEventListener('click', () => {
                window.SHHub?.setApiBaseUrl?.('');
                showStatus('Cleared saved API URL. Demo mode enabled.', 'info');
                applyModeUI();
            });

            const currentUser = window.SHHub?.getUser?.();
            if (!currentUser?.isAdmin) {
                document.getElementById('settings-denied').classList.remove('hidden');
                window.SHHub?.refreshIcons?.();
                return;
            }

            document.getElementById('settings-content').classList.remove('hidden');
            applyModeUI();
            window.SHHub?.refreshIcons?.();
        });
    </script>
</body>
</html>
