<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Hustle Hub</title>
    <meta name="description" content="Modern campus marketplace for student talent: tutoring, assignment support, design, programming, CV writing, and more.">
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="app.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0F766E',
                        secondary: '#F59E0B',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen antialiased text-slate-900 dark:text-slate-100">
    <div class="app-bg"></div>
    <header id="app-navbar"></header>

    <main class="mx-auto max-w-7xl px-4 pb-16 pt-10">
        <section class="hero-shell mx-auto max-w-4xl rounded-3xl px-6 py-10 text-center sm:px-10">
            <div class="inline-flex items-center gap-2 rounded-full border border-slate-200/70 bg-white/70 px-3 py-1 text-xs font-medium text-slate-700 shadow-sm backdrop-blur dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-slate-200">
                <span class="inline-flex h-2 w-2 rounded-full bg-secondary"></span>
                Built for campus
            </div>
            <h1 class="mt-5 text-4xl font-semibold tracking-tight text-slate-900 dark:text-white sm:text-5xl">
                Your modern marketplace for
                <span class="bg-gradient-to-r from-primary to-indigo-500 bg-clip-text text-transparent">student talent</span>.
            </h1>
            <p class="mt-4 text-base leading-relaxed text-slate-600 dark:text-slate-300 sm:text-lg">
                Discover tutoring, assignment support, design, programming, CV writing, and more from trusted students right on campus.
            </p>
            <div class="mt-6 flex flex-wrap items-center justify-center gap-2">
                <span class="hero-chip">Tutoring</span>
                <span class="hero-chip">Assignment Help</span>
                <span class="hero-chip">Design</span>
                <span class="hero-chip">Programming</span>
                <span class="hero-chip">CV Writing</span>
            </div>
        </section>

        <section class="mx-auto mt-8 max-w-4xl glass rounded-2xl p-4 shadow-sm sm:p-6">
            <div class="flex flex-col gap-3 md:flex-row md:items-center">
                <div class="relative flex-1">
                    <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                        <i data-lucide="search" class="h-4 w-4"></i>
                    </span>
                    <input type="text" id="search" placeholder="Search services..." class="w-full rounded-xl border border-slate-200/70 bg-white/80 py-3 pl-10 pr-3 text-sm text-slate-900 shadow-sm outline-none ring-primary/30 placeholder:text-slate-400 focus:border-primary/60 focus:ring-4 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-white dark:placeholder:text-slate-400">
                </div>
                <div class="flex flex-col gap-3 sm:flex-row md:w-auto">
                    <select id="category" class="w-full rounded-xl border border-slate-200/70 bg-white/80 px-3 py-3 text-sm text-slate-900 shadow-sm outline-none ring-primary/30 focus:border-primary/60 focus:ring-4 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-white">
                        <option value="">All Categories</option>
                        <option value="Tutoring">Tutoring</option>
                        <option value="Assignment Help">Assignment Help</option>
                        <option value="Graphic Design">Graphic Design</option>
                        <option value="Programming Help">Programming Help</option>
                        <option value="CV Writing">CV Writing</option>
                        <option value="Other">Other</option>
                    </select>
                    <button id="clear-filters" type="button" class="inline-flex items-center justify-center gap-2 rounded-xl border border-slate-200/70 bg-white/70 px-4 py-3 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-white dark:border-slate-700/60 dark:bg-slate-950/40 dark:text-slate-200 dark:hover:bg-slate-950/60">
                        <i data-lucide="rotate-ccw" class="h-4 w-4"></i>
                        Clear
                    </button>
                </div>
            </div>
            <div id="listing-type-filter" class="mt-4 grid grid-cols-1 gap-2 sm:grid-cols-3">
                <button type="button" data-listing-filter="all" class="listing-filter-btn inline-flex items-center justify-center gap-2 rounded-xl border border-slate-200/70 bg-primary px-4 py-2.5 text-sm font-medium text-white shadow-sm transition hover:brightness-95 dark:border-slate-700/60">
                    <i data-lucide="layers" class="h-4 w-4"></i>
                    All Listings
                </button>
                <button type="button" data-listing-filter="seller" class="listing-filter-btn inline-flex items-center justify-center gap-2 rounded-xl border border-slate-200/70 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-slate-200 dark:hover:bg-slate-950/70">
                    <i data-lucide="badge-dollar-sign" class="h-4 w-4"></i>
                    Sellers
                </button>
                <button type="button" data-listing-filter="buyer" class="listing-filter-btn inline-flex items-center justify-center gap-2 rounded-xl border border-slate-200/70 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-slate-200 dark:hover:bg-slate-950/70">
                    <i data-lucide="shopping-bag" class="h-4 w-4"></i>
                    Buyers
                </button>
            </div>
        </section>

        <section class="mt-10 rounded-3xl border border-slate-200/70 bg-white/55 p-4 shadow-[0_18px_42px_-34px_rgba(15,23,42,.45)] backdrop-blur-sm dark:border-slate-700/60 dark:bg-slate-950/35 sm:p-6">
            <div class="mb-4 flex items-end justify-between gap-4">
                <h2 class="text-lg font-semibold tracking-tight text-slate-900 dark:text-white">Services</h2>
                <p id="result-count" class="text-sm text-slate-600 dark:text-slate-300"></p>
            </div>
            <div id="services-grid" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
                <div class="glass rounded-2xl p-6 text-center text-sm text-slate-600 dark:text-slate-300">
                    Loading services...
                </div>
            </div>
        </section>

    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
        const servicesGrid = document.getElementById('services-grid');
        const searchInput = document.getElementById('search');
        const categorySelect = document.getElementById('category');
        const clearBtn = document.getElementById('clear-filters');
        const resultCount = document.getElementById('result-count');
        const listingFilterButtons = Array.from(document.querySelectorAll('[data-listing-filter]'));
        let activeListingFilter = 'all';

        // Mock Data for GitHub Pages demo mode
        const MOCK_SERVICES = [
            { _id: '1', title: 'Calculus & Engineering Maths Tutoring', description: 'Expert help with Calculus I, II, and III.', category: 'Tutoring', listingType: 'seller', price: 2500, user: { name: 'Wanjiku Njeri', university: 'University of Nairobi', image: 'https://i.pravatar.cc/150?u=1' }, contactInfo: '254712345678' },
            { _id: '2', title: 'Logo & Poster Design', description: 'Professional logo design for your startup.', category: 'Graphic Design', listingType: 'seller', price: 5000, user: { name: 'Otieno Kevin', university: 'Kenyatta University', image: 'https://i.pravatar.cc/150?u=2' }, contactInfo: '254722345678' },
            { _id: '3', title: 'Python Automation Scripts', description: 'I can write python scripts for automation.', category: 'Programming Help', listingType: 'seller', price: 3000, user: { name: 'Kiptoo Cheruiyot', university: 'JKUAT', image: 'https://i.pravatar.cc/150?u=3' }, contactInfo: '254732345678' },
            { _id: '4', title: 'Assignment Proofreading', description: 'Fast and accurate proofreading for essays and reports.', category: 'Assignment Help', listingType: 'seller', price: 1500, user: { name: 'Achieng Auma', university: 'Egerton University', image: 'https://i.pravatar.cc/150?u=4' }, contactInfo: '254742345678' },
            { _id: '5', title: 'Resume Revamp', description: 'Get your CV ready for internships.', category: 'CV Writing', listingType: 'seller', price: 4000, user: { name: 'Muthoni Wairimu', university: 'Moi University', image: 'https://i.pravatar.cc/150?u=5' }, contactInfo: '254752345678' },
            { _id: '6', title: 'Need React Assignment Help', description: 'Looking for someone to guide me through a React assignment due this week.', category: 'Programming Help', listingType: 'buyer', price: 3000, user: { name: 'Brian Mwangi', university: 'Strathmore University', image: 'https://i.pravatar.cc/150?u=6' }, contactInfo: '254701112233' },
            { _id: '7', title: 'Looking for CV Rewrite', description: 'Need a strong internship CV rewrite and LinkedIn profile polish.', category: 'CV Writing', listingType: 'buyer', price: 2500, user: { name: 'Mercy Atieno', university: 'USIU-Africa', image: 'https://i.pravatar.cc/150?u=7' }, contactInfo: '254709998877' },
            { _id: '8', title: 'Excel & SPSS Data Analysis', description: 'SPSS, R, and Python data analysis help.', category: 'Assignment Help', listingType: 'seller', price: 4200, user: { name: 'Amina Noor', university: 'Daystar University', image: 'https://i.pravatar.cc/150?u=8' }, contactInfo: '254711223344' },
            { _id: '9', title: 'Need Event Photographer', description: 'Looking for a student photographer for a campus event this weekend.', category: 'Other', listingType: 'buyer', price: 6500, user: { name: 'Kevin Mutiso', university: 'Mount Kenya University', image: 'https://i.pravatar.cc/150?u=9' }, contactInfo: '254733889900' },
            { _id: '10', title: 'UI/UX Mobile App Screens', description: 'Modern Figma screens for student startups.', category: 'Graphic Design', listingType: 'seller', price: 7800, user: { name: 'Njeri Waithera', university: 'Technical University of Kenya', image: 'https://i.pravatar.cc/150?u=10' }, contactInfo: '254722991122' },
        ];

        const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

        const STUDENT_THEMES = [
            { from: '#0F766E', to: '#14B8A6', rgb: '15,118,110' },
            { from: '#B45309', to: '#F59E0B', rgb: '180,83,9' },
            { from: '#0369A1', to: '#38BDF8', rgb: '3,105,161' },
            { from: '#7C3AED', to: '#C084FC', rgb: '124,58,237' },
            { from: '#BE123C', to: '#FB7185', rgb: '190,18,60' },
            { from: '#1D4ED8', to: '#60A5FA', rgb: '29,78,216' },
            { from: '#166534', to: '#4ADE80', rgb: '22,101,52' },
        ];

        const hashKey = (value) => {
            let hash = 0;
            const text = String(value ?? '');
            for (let i = 0; i < text.length; i += 1) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        };

        const getStudentTheme = (service) => {
            const key = service?.user?._id || service?.user?.email || service?.user?.name || service?._id || 'default';
            return STUDENT_THEMES[hashKey(key) % STUDENT_THEMES.length];
        };

        const renderServiceCard = (service) => {
            const theme = getStudentTheme(service);
            const cardStyle = `--accent-1:${theme.from}; --accent-2:${theme.to}; --accent-rgb:${theme.rgb};`;
            const listingType = service?.listingType === 'buyer' ? 'buyer' : 'seller';
            const provider = service?.user ?? {};
            const providerName = provider.name ?? 'Student';
            const providerUniversity = provider.university ?? 'Campus';
            const providerImage = provider.image ?? `https://i.pravatar.cc/150?u=${encodeURIComponent(provider.email ?? providerName)}`;
            const contactInfo = String(service?.contactInfo ?? '').trim();
            const modeLabel = listingType === 'buyer' ? 'Buyer Request' : 'Seller Offer';
            const modeClasses = listingType === 'buyer'
                ? 'bg-amber-500/15 text-amber-700 ring-1 ring-amber-500/30 dark:bg-amber-400/15 dark:text-amber-200'
                : 'bg-emerald-500/15 text-emerald-700 ring-1 ring-emerald-500/30 dark:bg-emerald-400/15 dark:text-emerald-200';
            const amountLabel = listingType === 'buyer' ? 'Budget' : 'Price';
            const amountValue = window.SHHub?.formatKES?.(service.price) ?? `KES ${Number(service.price ?? 0).toLocaleString('en-KE')}`;
            const whatsappText = listingType === 'buyer'
                ? `Hi, I can help with your request: ${service.title}`
                : `Hi, I'm interested in your service: ${service.title}`;
            const actionText = listingType === 'buyer' ? 'Offer Help' : 'Chat';

            return `
            <article class="service-card card-hover group rounded-2xl p-6" style="${cardStyle}">
                <div class="flex items-start justify-between gap-3">
                    <div class="flex items-center gap-3">
                        <img src="${providerImage}" alt="${providerName}" class="service-avatar h-10 w-10 rounded-full">
                        <div class="min-w-0">
                            <p class="truncate text-sm font-semibold text-slate-900 dark:text-white">${providerName}</p>
                            <p class="truncate text-xs text-slate-500 dark:text-slate-400">${providerUniversity}</p>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="${modeClasses} shrink-0 rounded-full px-3 py-1 text-xs font-semibold">${modeLabel}</span>
                        <span class="service-pill shrink-0 rounded-full px-3 py-1 text-xs font-semibold">${service.category}</span>
                    </div>
                </div>

                <h3 class="mt-4 text-lg font-semibold tracking-tight text-slate-900 dark:text-white">${service.title}</h3>
                <p class="mt-2 text-sm leading-relaxed text-slate-600 dark:text-slate-300">${service.description}</p>

                <div class="mt-5 flex items-center justify-between gap-3 border-t border-slate-200/50 pt-4 dark:border-slate-700/50">
                    <div>
                        <p class="text-xs text-slate-500 dark:text-slate-400">${amountLabel}</p>
                        <p class="text-lg font-semibold text-secondary">${amountValue}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <a href="https://wa.me/${contactInfo}?text=${encodeURIComponent(whatsappText)}" target="_blank" class="inline-flex items-center gap-2 rounded-xl border border-emerald-200/70 bg-emerald-50 px-3 py-2 text-sm font-medium text-emerald-700 shadow-sm transition hover:bg-emerald-100 dark:border-emerald-500/30 dark:bg-emerald-500/10 dark:text-emerald-200 dark:hover:bg-emerald-500/20" title="Chat on WhatsApp">
                            <i data-lucide="message-circle" class="h-4 w-4"></i>
                            ${actionText}
                        </a>
                        <a href="service.html?id=${service._id}" class="inline-flex items-center gap-2 rounded-xl bg-primary px-3 py-2 text-sm font-medium text-white shadow-sm transition hover:brightness-95">
                            View
                            <i data-lucide="arrow-right" class="h-4 w-4"></i>
                        </a>
                    </div>
                </div>
            </article>
            `;
        };

        const filterLocalServices = (keywordValue, categoryValue) => {
            const allServices = window.SHHub?.getAllServices?.() ?? MOCK_SERVICES;
            return allServices.filter(service => {
                const listingType = service?.listingType === 'buyer' ? 'buyer' : 'seller';
                const title = String(service?.title ?? '').toLowerCase();
                const description = String(service?.description ?? '').toLowerCase();
                const matchesKeyword = title.includes(keywordValue) || description.includes(keywordValue);
                const matchesCategory = categoryValue === "" || service.category === categoryValue;
                const matchesListingType = activeListingFilter === 'all' || listingType === activeListingFilter;
                return matchesKeyword && matchesCategory && matchesListingType;
            });
        };

        async function fetchServices() {
            const keyword = searchInput.value.trim().toLowerCase();
            const category = categorySelect.value;

            // Simulate loading
            servicesGrid.innerHTML = '<div class="glass rounded-2xl p-6 text-center text-sm text-slate-600 dark:text-slate-300 md:col-span-2 lg:col-span-3">Loading services...</div>';
            await sleep(250);

            let services = [];
            if (window.SHHub?.isApiMode?.() && window.SHHub?.apiGetServices) {
                try {
                    services = await window.SHHub.apiGetServices({
                        keyword,
                        category,
                        listingType: activeListingFilter === 'all' ? '' : activeListingFilter,
                    });
                } catch {
                    services = filterLocalServices(keyword, category);
                }
            } else {
                services = filterLocalServices(keyword, category);
            }

            if (resultCount) {
                resultCount.innerText = `${services.length} result${services.length === 1 ? '' : 's'}`;
            }

            if (services.length === 0) {
                servicesGrid.innerHTML = `
                    <div class="glass rounded-2xl p-10 text-center text-sm text-slate-600 dark:text-slate-300 md:col-span-2 lg:col-span-3">
                        <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-900/5 text-slate-600 dark:bg-white/10 dark:text-slate-200">
                            <i data-lucide="inbox" class="h-5 w-5"></i>
                        </div>
                        <p class="mt-4 font-medium">No services found</p>
                        <p class="mt-1 text-slate-500 dark:text-slate-400">Try a different keyword or category.</p>
                    </div>
                `;
                window.SHHub?.refreshIcons?.();
                return;
            }

            servicesGrid.innerHTML = services.map(renderServiceCard).join('');
            
            window.SHHub?.refreshIcons?.();
        }

        searchInput.addEventListener('input', fetchServices);
        categorySelect.addEventListener('change', fetchServices);
        listingFilterButtons.forEach((button) => {
            button.addEventListener('click', () => {
                activeListingFilter = button.getAttribute('data-listing-filter') || 'all';
                listingFilterButtons.forEach((item) => {
                    const isActive = item === button;
                    item.classList.toggle('bg-primary', isActive);
                    item.classList.toggle('text-white', isActive);
                    item.classList.toggle('border-primary', isActive);
                    item.classList.toggle('bg-white', !isActive);
                    item.classList.toggle('text-slate-700', !isActive);
                });
                fetchServices();
            });
        });
        clearBtn?.addEventListener('click', () => {
            searchInput.value = '';
            categorySelect.value = '';
            activeListingFilter = 'all';
            listingFilterButtons.forEach((item) => {
                const isActive = item.getAttribute('data-listing-filter') === 'all';
                item.classList.toggle('bg-primary', isActive);
                item.classList.toggle('text-white', isActive);
                item.classList.toggle('border-primary', isActive);
                item.classList.toggle('bg-white', !isActive);
                item.classList.toggle('text-slate-700', !isActive);
            });
            fetchServices();
        });

        fetchServices();
        });
    </script>
</body>
</html>
