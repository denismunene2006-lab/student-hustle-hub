<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details - Student Hustle Hub</title>
    <meta name="description" content="View service details and contact the provider on Student Hustle Hub.">
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="app.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0F766E',
                        secondary: '#F59E0B'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen antialiased text-slate-900 dark:text-slate-100">
    <div class="app-bg"></div>
    <header id="app-navbar"></header>

    <main class="mx-auto max-w-7xl px-4 pb-16 pt-10">
        <a href="index.html" class="inline-flex items-center gap-2 rounded-xl border border-slate-200/70 bg-white/70 px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-white dark:border-slate-700/60 dark:bg-slate-950/40 dark:text-slate-200 dark:hover:bg-slate-950/60">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>
            Back to browse
        </a>

        <div id="not-found" class="hidden mt-8 glass rounded-2xl p-10 text-center text-sm text-slate-600 dark:text-slate-300">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-900/5 text-slate-600 dark:bg-white/10 dark:text-slate-200">
                <i data-lucide="file-question" class="h-5 w-5"></i>
            </div>
            <p class="mt-4 font-medium">Service not found</p>
            <p class="mt-1 text-slate-500 dark:text-slate-400">The link may be outdated, or the service was removed.</p>
            <a href="index.html" class="mt-5 inline-flex items-center justify-center gap-2 rounded-xl bg-primary px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:brightness-95">
                <i data-lucide="search" class="h-4 w-4"></i>
                Browse services
            </a>
        </div>

        <div id="content" class="hidden mt-8 grid gap-6 lg:grid-cols-3">
            <section class="glass rounded-2xl p-6 shadow-sm lg:col-span-2 sm:p-8">
                <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex flex-wrap items-center gap-2">
                        <span id="listing-type" class="inline-flex w-fit items-center rounded-full bg-emerald-500/15 px-3 py-1 text-xs font-semibold text-emerald-700 ring-1 ring-emerald-500/30 dark:bg-emerald-400/15 dark:text-emerald-200"></span>
                        <span id="cat" class="inline-flex w-fit items-center rounded-full bg-primary/10 px-3 py-1 text-xs font-semibold text-primary ring-1 ring-primary/20 dark:bg-primary/20 dark:ring-primary/30"></span>
                    </div>
                    <span id="created" class="text-xs font-medium text-slate-500 dark:text-slate-400"></span>
                </div>
                <h1 id="title" class="mt-4 text-3xl font-semibold tracking-tight text-slate-900 dark:text-white"></h1>
                <p id="desc" class="mt-4 whitespace-pre-wrap text-sm leading-relaxed text-slate-600 dark:text-slate-300"></p>
            </section>

            <aside class="glass rounded-2xl p-6 shadow-sm sm:p-8">
                <div class="flex items-center gap-3">
                    <img id="provider-img" alt="Provider" class="h-12 w-12 rounded-2xl object-cover ring-2 ring-primary/30" src="">
                    <div class="min-w-0">
                        <p id="provider-name" class="truncate text-sm font-semibold text-slate-900 dark:text-white"></p>
                        <p id="provider-uni" class="truncate text-xs text-slate-500 dark:text-slate-400"></p>
                        <p id="provider-email" class="truncate text-xs text-slate-500 dark:text-slate-400"></p>
                    </div>
                </div>

                <div class="mt-6 rounded-xl border border-slate-200/70 bg-white/60 p-4 dark:border-slate-700/60 dark:bg-slate-950/40">
                    <p id="price-label" class="text-xs font-medium text-slate-500 dark:text-slate-400">Price (KES)</p>
                    <p id="price" class="mt-2 text-3xl font-semibold tracking-tight text-secondary"></p>
                </div>

                <div class="mt-5 space-y-2 text-sm text-slate-600 dark:text-slate-300">
                    <p><span class="font-medium text-slate-900 dark:text-white">Contact:</span> <span id="contact"></span></p>
                </div>

                <a id="whatsapp-btn" href="#" target="_blank" class="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-emerald-500 px-4 py-3 text-sm font-medium text-white shadow-sm transition hover:bg-emerald-600">
                    <i data-lucide="message-circle" class="h-4 w-4"></i>
                    Contact on WhatsApp
                </a>
            </aside>
        </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            let data = null;
            try {
                if (window.SHHub?.isApiMode?.() && window.SHHub?.apiGetServiceById) {
                    data = await window.SHHub.apiGetServiceById(id);
                } else {
                    data = window.SHHub?.getServiceById?.(id);
                }
            } catch {
                data = window.SHHub?.getServiceById?.(id) ?? null;
            }

            if (!data) {
                document.getElementById('not-found').classList.remove('hidden');
                window.SHHub?.refreshIcons?.();
                return;
            }

            document.getElementById('content').classList.remove('hidden');
            const listingType = data?.listingType === 'buyer' ? 'buyer' : 'seller';
            document.getElementById('cat').innerText = data.category ?? '';
            const listingTypeEl = document.getElementById('listing-type');
            listingTypeEl.innerText = listingType === 'buyer' ? 'Buyer Request' : 'Seller Offer';
            listingTypeEl.className = listingType === 'buyer'
                ? 'inline-flex w-fit items-center rounded-full bg-amber-500/15 px-3 py-1 text-xs font-semibold text-amber-700 ring-1 ring-amber-500/30 dark:bg-amber-400/15 dark:text-amber-200'
                : 'inline-flex w-fit items-center rounded-full bg-emerald-500/15 px-3 py-1 text-xs font-semibold text-emerald-700 ring-1 ring-emerald-500/30 dark:bg-emerald-400/15 dark:text-emerald-200';
            document.getElementById('title').innerText = data.title ?? '';
            document.getElementById('desc').innerText = data.description ?? '';
            const priceLabel = listingType === 'buyer' ? 'Budget (KES)' : 'Price (KES)';
            document.getElementById('price-label').innerText = priceLabel;
            document.getElementById('price').innerText = window.SHHub?.formatKES?.(data.price) ?? `KES ${Number(data.price ?? 0).toLocaleString('en-KE')}`;

            const createdAt = data.createdAt ? new Date(data.createdAt) : null;
            document.getElementById('created').innerText = createdAt ? `Posted ${createdAt.toLocaleDateString()}` : '';

            const provider = data.user ?? {};
            document.getElementById('provider-name').innerText = provider.name ?? '';
            document.getElementById('provider-uni').innerText = provider.university ?? '';
            document.getElementById('provider-email').innerText = provider.email ?? '';
            document.getElementById('provider-img').src = provider.image ?? `https://i.pravatar.cc/150?u=${encodeURIComponent(provider.email ?? provider.name ?? 'provider')}`;

            const contact = String(data.contactInfo ?? '').trim();
            document.getElementById('contact').innerText = contact || '-';

            const whatsappBtn = document.getElementById('whatsapp-btn');
            const waNumber = contact.replace(/[^\d]/g, '');
            if (waNumber.length >= 8) {
                const message = listingType === 'buyer'
                    ? `Hi, I can help with your request: ${data.title}`
                    : `Hi, I'm interested in your service: ${data.title}`;
                whatsappBtn.href = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;
                whatsappBtn.innerHTML = listingType === 'buyer'
                    ? '<i data-lucide="message-circle" class="h-4 w-4"></i> Offer help on WhatsApp'
                    : '<i data-lucide="message-circle" class="h-4 w-4"></i> Contact on WhatsApp';
                whatsappBtn.classList.remove('hidden');
            } else {
                whatsappBtn.classList.add('hidden');
            }

            window.SHHub?.refreshIcons?.();
        });
    </script>
</body>
</html>
