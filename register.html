<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Hustle Hub</title>
    <meta name="description" content="Create a Student Hustle Hub account to post campus services and get discovered.">
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="app.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0F766E',
                        secondary: '#F59E0B',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen antialiased text-slate-900 dark:text-slate-100">
    <div class="app-bg"></div>
    <header id="app-navbar"></header>

    <main class="mx-auto flex max-w-7xl items-center justify-center px-4 py-12">
        <section class="w-full max-w-md glass rounded-2xl p-6 shadow-sm sm:p-8">
            <div class="flex items-start gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary/10 text-primary ring-1 ring-primary/20 dark:bg-primary/20 dark:ring-primary/30">
                    <i data-lucide="user-plus" class="h-5 w-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-semibold tracking-tight text-slate-900 dark:text-white">Create your account</h1>
                    <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">Start posting services and get discovered on campus.</p>
                </div>
            </div>

            <form id="register-form" class="mt-6 space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 dark:text-slate-200">Full name</label>
                    <input type="text" id="name" autocomplete="name" required class="mt-1 w-full rounded-xl border border-slate-200/70 bg-white/80 px-3 py-3 text-sm text-slate-900 shadow-sm outline-none ring-primary/30 placeholder:text-slate-400 focus:border-primary/60 focus:ring-4 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-white dark:placeholder:text-slate-400" placeholder="Jane Doe">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-200">Email</label>
                    <input type="email" id="email" autocomplete="email" required class="mt-1 w-full rounded-xl border border-slate-200/70 bg-white/80 px-3 py-3 text-sm text-slate-900 shadow-sm outline-none ring-primary/30 placeholder:text-slate-400 focus:border-primary/60 focus:ring-4 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-white dark:placeholder:text-slate-400" placeholder="you@university.edu">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-200">Password</label>
                    <input type="password" id="password" autocomplete="new-password" required class="mt-1 w-full rounded-xl border border-slate-200/70 bg-white/80 px-3 py-3 text-sm text-slate-900 shadow-sm outline-none ring-primary/30 placeholder:text-slate-400 focus:border-primary/60 focus:ring-4 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-white dark:placeholder:text-slate-400" placeholder="••••••••">
                </div>
                <div>
                    <label for="university" class="block text-sm font-medium text-slate-700 dark:text-slate-200">University</label>
                    <input type="text" id="university" required class="mt-1 w-full rounded-xl border border-slate-200/70 bg-white/80 px-3 py-3 text-sm text-slate-900 shadow-sm outline-none ring-primary/30 placeholder:text-slate-400 focus:border-primary/60 focus:ring-4 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-white dark:placeholder:text-slate-400" placeholder="Campus University">
                </div>
                <div>
                    <label for="course" class="block text-sm font-medium text-slate-700 dark:text-slate-200">Course</label>
                    <input type="text" id="course" required class="mt-1 w-full rounded-xl border border-slate-200/70 bg-white/80 px-3 py-3 text-sm text-slate-900 shadow-sm outline-none ring-primary/30 placeholder:text-slate-400 focus:border-primary/60 focus:ring-4 dark:border-slate-700/60 dark:bg-slate-950/50 dark:text-white dark:placeholder:text-slate-400" placeholder="Computer Science">
                </div>

                <div id="form-error" class="hidden rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-500/30 dark:bg-rose-500/10 dark:text-rose-200"></div>

                <button type="submit" class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-primary px-4 py-3 text-sm font-medium text-white shadow-sm transition hover:brightness-95">
                    <i data-lucide="sparkles" class="h-4 w-4"></i>
                    Create account
                </button>
            </form>

            <div class="mt-5 flex items-center justify-between text-sm">
                <a href="login.html" class="font-medium text-primary hover:underline">Already have an account?</a>
                <a href="index.html" class="text-slate-600 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white">Back to browse</a>
            </div>

            <p id="auth-mode-note" class="mt-6 text-xs text-slate-500 dark:text-slate-400">
                Demo mode: account data is stored locally in this browser.
            </p>
        </section>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('register-form');
            const errorEl = document.getElementById('form-error');
            const modeNoteEl = document.getElementById('auth-mode-note');
            const isApiMode = window.SHHub?.isApiMode?.() === true;
            if (modeNoteEl && isApiMode) {
                modeNoteEl.innerText = `API mode: using ${window.SHHub?.getApiBaseUrl?.() ?? ''}`;
            }

            const showError = (message) => {
                errorEl.innerText = message;
                errorEl.classList.remove('hidden');
            };

            const isNetworkError = (error) => {
                const message = String(error?.message ?? '').toLowerCase();
                return message.includes('failed to fetch') || message.includes('networkerror') || message.includes('network request failed');
            };

            const registerLocalDemo = (name, email, university, course) => {
                const id = (globalThis.crypto?.randomUUID?.() ?? `local-user-${Date.now()}`);
                const user = {
                    _id: id,
                    name,
                    email,
                    university,
                    course,
                    image: `https://i.pravatar.cc/150?u=${encodeURIComponent(email)}`,
                    token: 'demo-token',
                };

                window.SHHub?.setUser?.(user);
                if (!window.SHHub?.setUser) localStorage.setItem('user', JSON.stringify(user));
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorEl.classList.add('hidden');

                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const university = document.getElementById('university').value.trim();
                const course = document.getElementById('course').value.trim();

                if (!name) return showError('Please enter your name.');
                if (!email) return showError('Please enter your email.');
                if (!password || password.length < 6) return showError('Please enter a password with at least 6 characters.');
                if (!university) return showError('Please enter your university.');
                if (!course) return showError('Please enter your course.');

                try {
                    if (isApiMode && window.SHHub?.apiRegister) {
                        try {
                            await window.SHHub.apiRegister({
                                name,
                                email,
                                password,
                                university,
                                course,
                            });
                        } catch (error) {
                            if (!isNetworkError(error)) throw error;
                            registerLocalDemo(name, email, university, course);
                        }
                    } else {
                        registerLocalDemo(name, email, university, course);
                    }

                    window.location.href = 'dashboard.html';
                } catch (error) {
                    showError(error?.message || 'Registration failed.');
                }
            });
        });
    </script>
</body>
</html>
